name: Daily Catalog Seed

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC = 9 PM CDT — keys reset at midnight UTC, safe from local usage
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # --skip-rt means no web scraping; should finish in ~45 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-seed.txt

      - name: Install dependencies
        run: pip install -r requirements-seed.txt

      - name: Run catalog seed
        env:
          WATCHMODE_API_KEY:   ${{ secrets.WATCHMODE_API_KEY }}
          WATCHMODE_API_KEY_2: ${{ secrets.WATCHMODE_API_KEY_2 }}
          OMDB_API_KEY:        ${{ secrets.OMDB_API_KEY }}
          OMDB_API_KEY_2:      ${{ secrets.OMDB_API_KEY_2 }}
          OMDB_API_KEY_5:      ${{ secrets.OMDB_API_KEY_5 }}
          OMDB_APP_KEY:        ${{ secrets.OMDB_APP_KEY }}
          OMDB_NOEL_KEY:       ${{ secrets.OMDB_NOEL_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
        run: python catalog_seed.py --skip-urls

      - name: Commit and push updated catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalog_data.parquet
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: daily catalog enrichment $(date +%Y-%m-%d)"
          git push
